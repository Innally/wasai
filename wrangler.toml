# Cloudflare Pages + Functions. Stripe Node SDK needs nodejs_compat.
# https://developers.cloudflare.com/workers/runtime-apis/nodejs/

name = "wasai"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Required by Cloudflare Pages so wrangler.toml is valid. This site serves static files
# from the repo root (index.html, css/, js/, …). If you use a build step that outputs
# to another folder (e.g. dist/), change this to match.
pages_build_output_dir = "."

# Order notification URL for functions/api/webhook.js (optional; omit or override if needed).
[vars]
FORMSPREE_ENDPOINT = "https://formspree.io/f/xjgaqgvb"

# Must live at the same folder as package.json / functions/ (Pages "Root directory").
# If the dashboard Root directory is a subfolder, copy this file there or set Root to "/".
